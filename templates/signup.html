<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — College Compass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
    <!-- Background effects -->
    <canvas id="particle-canvas"></canvas>
    <div class="grid-overlay"></div>

    <!-- Navigation -->
    <nav class="auth-nav">
        <a href="/" class="nav-logo-link">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#navGrad3)" opacity="0.9"/>
                <path d="M2 17l10 5 10-5" stroke="url(#navGrad3)" stroke-width="2" stroke-linecap="round"/>
                <path d="M2 12l10 5 10-5" stroke="url(#navGrad3)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                <defs><linearGradient id="navGrad3" x1="2" y1="2" x2="22" y2="22"><stop stop-color="#FF6B35"/><stop offset="1" stop-color="#FF3D00"/></linearGradient></defs>
            </svg>
            <span class="logo-text">College<span class="accent">Compass</span></span>
        </a>
    </nav>

    <!-- Auth Card -->
    <main class="auth-main">
        <div class="auth-card" id="auth-card">
            <div class="card-glow"></div>

            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Get personalized college recommendations in minutes.</p>

            <!-- Error message -->
            <div class="auth-error" id="auth-error" style="display:none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <span id="error-text"></span>
            </div>

            <form id="signup-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Rajesh Kumar" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="min. 6 characters" required minlength="6" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>

                <button type="submit" class="auth-btn" id="auth-btn">
                    <span class="auth-btn-bg"></span>
                    <span class="auth-btn-text">Create Account</span>
                    <div class="auth-btn-loader" id="btn-loader" style="display:none;">
                        <div class="mini-spinner"></div>
                    </div>
                </button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="/login">Log in</a>
            </p>
        </div>
    </main>

    <script src="/static/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', () => {
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirm-password').value;
            if (pw !== cpw) {
                showError('Passwords do not match');
                return;
            }
            handleAuth('/api/auth/signup', {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: pw,
                confirm_password: cpw
            });
        });
    </script>
</body>
</html>
